{% extends 'base.html' %}
{% block title %}Access Denied — ContribKit{% endblock %}

<div class="container-app auth-page">

    <div class="empty-state-icon" style="color:var(--color-danger);"><i class="bi bi-shield-lock"></i></div>
    <h1 class="text-section-title">403 — Permission Denied</h1>

      <a href="/" class="btn btn-secondary">Return Home</a>
    </div>
  </div>
</div>
{% endblock %}
